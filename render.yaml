services:
  # --- Backend: FastAPI + LangGraph ---
  - type: web
    name: retain-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: "make build"
    startCommand: "make start"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: INNGEST_DEV
        value: 0
      - key: GOOGLE_API_KEY_1
        sync: false
      - key: GROQ_API_KEY_1
        sync: false
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
